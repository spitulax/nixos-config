[ids]
*

[main]
capslock=overload(ext, esc)
compose=rightalt
rightalt=leftalt
scrolllock=capslock

[ext]
space=esc
tab=enter
m=enter
k=up
j=down
h=left
l=right
w=up
s=down
a=left
d=right
z=backspace
x=delete
o=backspace
p=delete
q=home
e=end
r=pageup
f=pagedown

[ext+shift]
z=C-backspace
x=C-delete
o=C-backspace
p=C-delete
