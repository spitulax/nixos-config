[ids]
*

[main]
capslock=overload(ext, esc)
compose=rightalt
rightalt=leftalt
scrolllock=capslock

[ext]
space=esc
f=enter
k=up
j=down
h=left
l=right
w=up
s=down
a=left
d=right
q=home
e=end
z=backspace
x=delete
o=backspace
p=delete

[ext+shift]
h=home
l=end
k=pageup
j=pagedown
w=pageup
s=pagedown
z=C-backspace
x=C-delete
o=C-backspace
p=C-delete
